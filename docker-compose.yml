services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: offroad
      POSTGRES_PASSWORD: offroad
      POSTGRES_DB: offroad_shop
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U offroad -d offroad_shop']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
